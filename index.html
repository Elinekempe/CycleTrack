<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
      body { font-family: 'Poppins', sans-serif; }
      /* glasmorphism */
      .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); }
      /* animations */
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .fade-in { animation: fadeIn 0.3s ease-out; }
      /* privacy blur */
      body.privacy-mode [data-privacy] { filter: blur(8px); pointer-events: none; user-select: none; }
      body.privacy-mode .privacy-toggle { filter: none; pointer-events: auto; }
    </style>
    <title>CycleTrack</title>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-rose-50 via-white to-pink-50 text-slate-900">
    <main class="max-w-6xl mx-auto p-6 space-y-8" data-privacy>
      <header class="space-y-4 fade-in">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-rose-400 to-pink-500 flex items-center justify-center text-white font-bold text-lg shadow-lg">♀</div>
            <div>
              <h1 id="appName" class="text-4xl font-bold bg-gradient-to-r from-rose-600 to-pink-600 bg-clip-text text-transparent">CycleTrack</h1>
              <p class="text-slate-600 text-sm">Jouw cyclus, symptomen & trends</p>
            </div>
          </div>
        </div>

        <div class="glass rounded-xl p-4 border border-white/50 shadow-lg flex flex-wrap items-center gap-2">
          <button id="btnPrev" class="px-3 py-2 rounded-lg bg-white/80 hover:bg-white shadow text-sm font-medium transition">←</button>
          <div id="monthLabel" class="text-sm font-semibold px-4 py-2 rounded-lg bg-white/50"></div>
          <button id="btnNext" class="px-3 py-2 rounded-lg bg-white/80 hover:bg-white shadow text-sm font-medium transition">→</button>
          <div class="w-px h-6 bg-slate-200 mx-1"></div>
          <button id="btnToday" class="px-3 py-2 rounded-lg bg-gradient-to-r from-rose-100 to-pink-100 text-rose-700 hover:from-rose-200 hover:to-pink-200 text-sm font-medium transition">Vandaag</button>
          <button id="btnReset" class="px-3 py-2 rounded-lg bg-white/80 hover:bg-white shadow text-sm font-medium transition">Reset</button>
          <button id="btnPrivacy" class="privacy-toggle ml-auto px-3 py-2 rounded-lg bg-gradient-to-r from-amber-100 to-orange-100 text-amber-700 hover:from-amber-200 hover:to-orange-200 text-sm font-medium transition">Privacy</button>
        </div>
      </header>

      <section class="grid md:grid-cols-3 gap-6">
        <div class="md:col-span-2 glass rounded-2xl p-6 border border-white/50 shadow-xl fade-in">
          <div class="flex items-center justify-between mb-4">
            <div>
              <h2 class="font-semibold text-lg">Kalender</h2>
              <p class="text-xs text-slate-500">Maandweergave</p>
            </div>
            <div class="flex items-center gap-2 text-xs">
              <select id="filterSymptom" class="border border-slate-200 rounded-lg px-3 py-2 bg-white/80 hover:bg-white focus:ring-2 focus:ring-rose-300 focus:outline-none transition">
                <option value="">Filter symptoom</option>
              </select>
              <select id="filterMood" class="border border-slate-200 rounded-lg px-3 py-2 bg-white/80 hover:bg-white focus:ring-2 focus:ring-rose-300 focus:outline-none transition">
                <option value="">Filter mood</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4 p-3 bg-gradient-to-r from-rose-50 to-pink-50 rounded-xl border border-rose-100">
            <div class="flex items-center gap-2">
              <div class="w-2 h-2 rounded-full bg-gradient-to-br from-rose-400 to-pink-500 shadow-sm"></div>
              <span class="text-xs font-medium">Menstruatie (fase)</span>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-2 h-2 rounded-full bg-gradient-to-br from-amber-400 to-yellow-500 shadow-sm"></div>
              <span class="text-xs font-medium">Ovulatie</span>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-2 h-2 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 shadow-sm"></div>
              <span class="text-xs font-medium">Vruchtbaar</span>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-2.5 h-2.5 rounded-full bg-slate-700 shadow-sm"></div>
              <span class="text-xs font-medium">Met gegevens</span>
            </div>
          </div>

          <div class="grid grid-cols-7 gap-2 text-xs text-slate-600 font-bold mb-2 px-1">
            <span class="text-center">Ma</span>
            <span class="text-center">Di</span>
            <span class="text-center">Wo</span>
            <span class="text-center">Do</span>
            <span class="text-center">Vr</span>
            <span class="text-center">Za</span>
            <span class="text-center">Zo</span>
          </div>

          <div id="calendar" class="grid grid-cols-7 gap-2 text-sm select-none"></div>
        </div>

        <div class="glass rounded-2xl p-6 border border-white/50 shadow-xl fade-in space-y-4">
          <div>
            <h2 class="font-semibold text-lg">Dag Detail</h2>
            <p id="selectedDate" class="text-sm text-slate-600">Klik een dag in de kalender</p>
          </div>

          <div class="grid grid-cols-2 gap-3 mb-4">
            <button id="switchPeriod" class="px-4 py-3 border-2 border-slate-200 rounded-lg font-semibold text-sm bg-white/80 text-slate-700 transition hover:bg-rose-50">🩸 Menstruatie</button>
            <button id="switchIntercourse" class="px-4 py-3 border-2 border-slate-200 rounded-lg font-semibold text-sm bg-white/80 text-slate-700 transition hover:bg-rose-50">💑 Gemeenschap</button>
          </div>

          <div id="intercourseModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 rounded-lg">
            <div class="glass rounded-2xl p-6 border border-white/50 shadow-2xl max-w-sm w-full mx-4">
              <h3 class="text-lg font-semibold mb-4">Geslachtsgemeenschap</h3>
              <p class="text-sm text-slate-600 mb-6">Selecteer een optie:</p>
              <div class="flex gap-3">
                <button id="interceptWithProtection" class="flex-1 px-4 py-3 rounded-lg bg-gradient-to-r from-blue-500 to-cyan-500 text-white font-semibold hover:from-blue-600 hover:to-cyan-600 shadow transition">
                  Met bescherming
                </button>
                <button id="interceptWithoutProtection" class="flex-1 px-4 py-3 rounded-lg bg-gradient-to-r from-orange-500 to-red-500 text-white font-semibold hover:from-orange-600 hover:to-red-600 shadow transition">
                  Zonder bescherming
                </button>
              </div>
              <button id="interceptCancel" class="w-full mt-3 px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-medium hover:bg-slate-300 transition">Annuleren</button>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Symptomen</label>
            <div id="symptoms" class="flex flex-wrap gap-2"></div>
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Mood</label>
            <div id="moods" class="flex gap-2"></div>
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Tags</label>
            <div id="tags" class="flex flex-wrap gap-2"></div>
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Intensiteit (1-10)</label>
            <input id="intensity" type="range" min="0" max="10" value="0" class="w-full h-2 bg-gradient-to-r from-rose-200 to-pink-200 rounded-lg appearance-none cursor-pointer focus:outline-none focus:ring-2 focus:ring-rose-300"/>
            <div class="flex justify-between items-center mt-1">
              <span class="text-xs text-slate-500">Geen pijn</span>
              <span id="intensityLabel" class="text-sm font-semibold text-rose-600">-</span>
              <span class="text-xs text-slate-500">Ernstig</span>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Notitie</label>
            <textarea id="note" class="w-full border border-slate-200 rounded-lg px-3 py-2 bg-white/80 text-sm focus:ring-2 focus:ring-rose-300 focus:outline-none transition" rows="3" placeholder="Voeg notities toe..."></textarea>
          </div>

          <div class="flex gap-2">
            <button id="saveEntry" class="flex-1 px-4 py-3 rounded-lg bg-gradient-to-r from-rose-500 to-pink-500 text-white font-semibold hover:from-rose-600 hover:to-pink-600 shadow-lg transition transform hover:scale-105">Opslaan</button>
            <button id="deleteEntry" class="px-4 py-3 rounded-lg bg-red-100 text-red-700 font-semibold hover:bg-red-200 shadow transition" title="Verwijder deze dag">🗑️</button>
          </div>
        </div>
      </section>

      <section class="grid md:grid-cols-2 gap-6 fade-in">
        <div class="glass rounded-2xl p-6 border border-white/50 shadow-xl">
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold text-lg">Voorspelling</h2>
          </div>
          <div id="prediction" class="text-sm text-slate-700 space-y-2"></div>
        </div>

        <div class="glass rounded-2xl p-6 border border-white/50 shadow-xl">
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold text-lg">Statistieken</h2>
          </div>
          <div id="stats" class="text-sm text-slate-700 space-y-2"></div>
        </div>
      </section>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
